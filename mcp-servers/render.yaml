services:
  - type: web
    name: patient-records-mcp
    env: python
    plan: free
    rootDir: mcp-servers/patient-records-mcp
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: MCP_HOST
        value: 0.0.0.0
      - key: MCP_PORT
        value: 9002
      - key: MCP_PATH
        value: /mcp
      - key: MCP_TRANSPORT
        value: streamable-http
      - key: FHIR_BASE_URL
        value: https://hapi.fhir.org/baseR4
      - key: PYTHON_VERSION
        value: 3.10

  - type: web
    name: document-generation-mcp
    env: python
    plan: free
    rootDir: mcp-servers/document-generation-mcp
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: MCP_HOST
        value: 0.0.0.0
      - key: MCP_PORT
        value: 9003
      - key: MCP_PATH
        value: /mcp
      - key: MCP_TRANSPORT
        value: streamable-http
      - key: PYTHON_VERSION
        value: 3.10

  - type: web
    name: payer-rules-mcp
    env: python
    plan: free
    rootDir: mcp-servers/payer-rules-mcp
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: MCP_HOST
        value: 0.0.0.0
      - key: MCP_PORT
        value: 9004
      - key: MCP_PATH
        value: /mcp
      - key: MCP_TRANSPORT
        value: streamable-http
      - key: PYTHON_VERSION
        value: 3.10
